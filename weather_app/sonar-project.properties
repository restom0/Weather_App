# ── SonarCloud configuration ────────────────────────────────────────────────
# These must match the SonarCloud project exactly. Both keys are shown on the
# project's "Information" page at https://sonarcloud.io.
sonar.organization=restom0
sonar.projectKey=restom0_Weather_App
sonar.projectName=Weather App

# Sources & tests. Paths are relative to this file's directory, which the CI
# workflow passes to the scanner as `projectBaseDir`.
sonar.sources=src,api
sonar.tests=src,api
sonar.test.inclusions=**/*.test.js,**/*.test.jsx

# Test coverage — LCOV report produced by `npm run coverage`.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Keep generated / non-product code out of analysis and coverage math.
sonar.exclusions=dist/**,coverage/**,node_modules/**
sonar.coverage.exclusions=**/*.test.js,**/*.test.jsx,vite.config.js,vitest.config.js,src/main.jsx,src/test/**

sonar.sourceEncoding=UTF-8
