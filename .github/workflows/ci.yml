name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-and-analyze:
    name: Test & SonarCloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Sonar needs full history for accurate blame / new-code detection.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pizzahut_test/package-lock.json

      - name: Install dependencies
        working-directory: pizzahut_test
        run: npm ci

      - name: Run tests with coverage
        working-directory: pizzahut_test
        run: npm run coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        with:
          # Directory that contains sonar-project.properties + the coverage report.
          projectBaseDir: pizzahut_test
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
