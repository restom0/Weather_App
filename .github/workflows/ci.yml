name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Tests gate everything else ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: weather_app/package-lock.json

      - name: Install dependencies
        working-directory: weather_app
        run: npm ci

      - name: Run tests with coverage
        working-directory: weather_app
        run: npm run coverage

      # Hand the LCOV report to the sonar job (jobs run on separate runners).
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: weather_app/coverage
          retention-days: 1

  # ── Code quality. Runs independently so a Sonar outage/misconfig can't block
  #    deploys. Add `sonar` to the deploy job's `needs` to make it a hard gate. ──
  sonar:
    name: SonarCloud
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Sonar needs full history for accurate blame / new-code detection.
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: weather_app/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          # Directory that contains sonar-project.properties + the coverage report.
          projectBaseDir: weather_app
          # Don't wait for Quality Gate in CI; waiting can fail on transient
          # SonarCloud API timeouts even when analysis upload succeeds.
          args: -Dsonar.qualitygate.wait=false
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ── Production deploy: only for pushes to master, never for pull requests ───
  deploy:
    name: Deploy to Vercel
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        working-directory: weather_app
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        working-directory: weather_app
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        working-directory: weather_app
        run: |
          url="$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to $url"
          echo "### :rocket: Deployed to $url" >> "$GITHUB_STEP_SUMMARY"
