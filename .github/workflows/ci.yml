name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # Tests gate everything else.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: weather_app/package-lock.json

      - name: Install dependencies
        working-directory: weather_app
        run: npm ci

      - name: Run tests with coverage
        working-directory: weather_app
        run: npm run coverage

      # Hand the LCOV report to the sonar job (jobs run on separate runners).
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: weather_app/coverage
          retention-days: 1

  # Code quality. Runs independently so a Sonar outage/misconfig can't block
  # deploys. Add `sonar` to the deploy job's `needs` to make it a hard gate.
  sonar:
    name: SonarCloud
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Sonar needs full history for accurate blame / new-code detection.
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage
          path: weather_app/coverage

      - name: Check SonarCloud credentials
        id: creds
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SONAR_TOKEN is not configured; skipping SonarCloud scan."
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud scan and quality gate
        if: steps.creds.outputs.configured == 'true' && github.event_name != 'pull_request'
        uses: SonarSource/sonarqube-scan-action@v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: weather_app
          args: >
            -Dsonar.branch.name=master
            -Dsonar.qualitygate.wait=true

      - name: SonarCloud pull request scan and quality gate
        if: steps.creds.outputs.configured == 'true' && github.event_name == 'pull_request'
        uses: SonarSource/sonarqube-scan-action@v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: weather_app
          args: >
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.head_ref }}
            -Dsonar.pullrequest.base=${{ github.base_ref }}
            -Dsonar.qualitygate.wait=true

  # Production deploy: only for pushes to master, never for pull requests.
  deploy:
    name: Deploy to Vercel
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Verify Vercel secrets
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub Actions secret: $name"
              missing=1
            fi
          done
          exit "$missing"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        working-directory: weather_app
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        working-directory: weather_app
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        working-directory: weather_app
        run: |
          url="$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to $url"
          echo "### :rocket: Deployed to $url" >> "$GITHUB_STEP_SUMMARY"
